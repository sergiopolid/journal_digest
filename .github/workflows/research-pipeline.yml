- name: Run discovery and curation
  env:
    ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
    NOTION_API_KEY: ${{ secrets.NOTION_API_KEY }}
  run: python main.py

- name: Commit Obsidian notes back to repo
  run: |
    git config --global user.name "journal-digest-bot"
    git config --global user.email "actions@github.com"
    git add obsidian_notes/
    git diff --staged --quiet || git commit -m "📚 Weekly digest $(date +'%Y-%m-%d')"
    git push
