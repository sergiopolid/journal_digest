name: Research Pipeline - Weekly Discovery

on:
  schedule:
    - cron: '0 8 * * 0'
  workflow_dispatch:

jobs:
  discover-and-curate:
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      
      - name: Run discovery and curation
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          NOTION_API_KEY: ${{ secrets.NOTION_API_KEY }}
          ZOTERO_API_KEY: ${{ secrets.ZOTERO_API_KEY }}
          ZOTERO_USER_ID: ${{ secrets.ZOTERO_USER_ID }}
          OBSIDIAN_VAULT_PATH: ${{ secrets.OBSIDIAN_VAULT_PATH }}
          YOUR_EMAIL: ${{ secrets.YOUR_EMAIL }}
        run: python main.py
      
      - name: Log completion
        if: success()
        run: echo "✅ Pipeline run completed successfully"
      
      - name: Log failure
        if: failure()
        run: echo "❌ Pipeline run failed - check logs above"
